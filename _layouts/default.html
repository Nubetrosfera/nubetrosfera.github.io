<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
    <style>
    .grid-welcome {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 40px;
        margin: 40px 0 60px 0;
    }

    .welcome-text {
        flex: 1.5;
        min-width: 300px;
        font-family: -apple-system, sans-serif;
        font-size: 25px; 
        font-weight: 700; 
        line-height: 1.1;
        letter-spacing: -1.5px;
        color: #111; 
        /* ESTA ES LA MAGIA: */
        max-width: 400px; /* Ajusta este número según qué tan ancho quieras el bloque */
    }

    .welcome-photo-container {
        flex: 1;
        min-width: 300px;
    }

    .welcome-photo {
        width: 100%;
        height: auto;
        border-radius: 35px; /* Bordes redondeados modernos */
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        display: block;
    }

    .seccion-notas {
        margin-top: 50px;
        border-top: 1px solid #eee;
        padding-top: 30px;
    }
    /* Ajuste del Menú Superior (Navegación) */
    header.site-header {
        border: none !important; /* Quita la línea gris de arriba */
        padding: 30px 0;
    }

    .site-title {
        font-weight: 800 !important;
        letter-spacing: -1px;
        text-transform: lowercase;
    }

    .site-nav .nav-link {
        font-family: -apple-system, sans-serif;
        text-transform: lowercase; /* Todo en minúsculas como iamrobin */
        font-size: 14px; /* Más pequeño y elegante */
        font-weight: 500;
        letter-spacing: 0.5px;
        color: #555 !important;
        margin-left: 20px;
    }

    /* Cambia el color cuando pasas el mouse */
    .site-nav .nav-link:hover {
        color: #000 !important;
        text-decoration: none;
    }
    </style>
</head>
<body>

  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ '/blog/' | relative_url }}">blog</a>
      <a href="{{ '/recursos/' | relative_url }}">recursos</a>
      <a href="{{ '/galeria/' | relative_url }}">galería</a>
      <a href="{{ '/didacticos/' | relative_url }}">didácticos</a>
      <a href="{{ '/radiocumulus/' | relative_url }}">radiocumulus</a>
    </nav>
  </header>

  <main class="wrapper-content">
    {{ content }}
  </main>

</body>
</html>
