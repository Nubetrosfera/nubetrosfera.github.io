---
layout: default
---
<article class="post-content">
  <header class="post-header">
    <span class="post-date">{{ page.date | date: "%d %b %Y" }}</span>
    <h1 class="post-title-main">{{ page.title | downcase }}</h1>
    {% if page.image %}
      <img src="{{ site.baseurl }}/{{ page.image }}" class="post-banner" alt="{{ page.title }}">
    {% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>

<style>
  .post-content { max-width: 700px; margin: 0 auto; padding-top: 20px; }
  .post-date { color: #888; font-size: 0.9rem; text-transform: lowercase; }
  .post-title-main { font-size: 2.5rem; font-weight: 800; letter-spacing: -1.5px; margin: 10px 0 30px; line-height: 1.1; }
  .post-banner { width: 100%; border-radius: 30px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
  
  /* Estilo para el cuerpo del texto */
  .post-body { font-size: 1.1rem; line-height: 1.7; color: #333; }
  .post-body h2 { font-weight: 800; letter-spacing: -0.5px; margin-top: 40px; text-transform: lowercase; }
  
  /* ESTILO PARA EL CÓDIGO (R, Bash, etc.) */
  pre, code { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 0.9rem; background: #f8f9fa; border-radius: 15px; }
  pre { padding: 20px; overflow-x: auto; border: 1px solid #eee; margin: 25px 0; }
  code { padding: 3px 6px; color: #d63384; } /* Código en línea */
  pre code { padding: 0; color: #333; background: transparent; }
</style>
